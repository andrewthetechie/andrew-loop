[alembic]
script_location = migrations

# Override at runtime with: alembic -x db_path=/path/to/state.db upgrade head
# Or set ORCH_DB_PATH environment variable.
# Defaults to .orchestra/state.db relative to project root.
sqlalchemy.url = sqlite:///.orchestra/state.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
